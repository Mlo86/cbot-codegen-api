services:
  - type: web
    name: cbot-codegen-api
    runtime: python
    plan: free
    rootDir: services/codegen-api
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: API_TOKEN
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: TWELVE_DATA_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.9"
